{{ $friends := site.Data.friends }}
{{ if $friends }}
<section class="section friends-section">
  <div class="section-title">
    <div>
      <p class="eyebrow">Links</p>
      <h2>友情链接</h2>
    </div>
  </div>
  <div class="friends-grid">
    {{ range $friends }}
      <a class="friend-card" href="{{ .url }}" target="_blank" rel="noopener noreferrer">
        <span class="friend-card__tag">{{ .tag }}</span>
        <strong>{{ .name }}</strong>
        <p>{{ .description }}</p>
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
