{{ define "main" }}
  <article class="section article">
    <header class="article-header">
      <p class="eyebrow">{{ .Section | default "Page" }}</p>
      <h1>{{ .Title }}</h1>
      {{ if .Date }}<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>{{ end }}
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}
